<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supplier Search Report</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-soft: #e5f3f1;
      --warn: #9a3412;
      --warn-soft: #fff3e8;
      --good: #166534;
      --good-soft: #e8f6ed;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.5 Arial, Helvetica, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.2;
    }

    .meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .item-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .item-head h2 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.3;
    }

    .original-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }

    .field {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      min-width: 0;
      background: #fbfcfd;
    }

    .field strong {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 3px;
    }

    .summary {
      grid-column: 1 / -1;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .images {
      display: flex;
      gap: 12px;
      padding: 16px 20px 0;
      overflow-x: auto;
    }

    .images figure {
      width: 180px;
      flex: 0 0 180px;
      margin: 0;
    }

    .images img {
      width: 180px;
      height: 132px;
      object-fit: contain;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: block;
    }

    .images figcaption {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .supplier-list {
      padding: 16px 20px 20px;
      display: grid;
      gap: 14px;
    }

    .supplier {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
    }

    .supplier h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .source {
      margin: 0 0 10px;
      overflow-wrap: anywhere;
    }

    .source a {
      color: var(--accent);
      font-weight: 700;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
    }

    .result-grid p {
      margin: 0;
    }

    .span {
      grid-column: 1 / -1;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .exact_match {
      color: var(--good);
      background: var(--good-soft);
    }

    .alternative {
      color: var(--warn);
      background: var(--warn-soft);
    }

    .empty {
      color: var(--muted);
      padding: 18px 20px;
    }

    @media (max-width: 760px) {
      header {
        padding: 14px 16px;
      }

      main {
        padding: 14px;
      }

      .original-grid,
      .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Supplier Search Report</h1>
    <div class="meta" id="report-meta"></div>
  </header>

  <main id="items"></main>

  <script>
    window.SUPPLIER_SEARCH_REPORT = window.SUPPLIER_SEARCH_REPORT || {
      generated_at: "",
      rfq_id: "",
      company_id: "",
      user_id: "",
      persistence_table: "",
      persistence_status: "",
      items: [
        {
          item_id: "",
          company_description: "",
          qty: "",
          uom: "",
          agent_item_summary: "",
          images: [
            { url: "", caption: "" }
          ],
          suppliers: [
            {
              supplier_name: "",
              source_url: "",
              other_information: "",
              match_type: "exact_match",
              match_score: 0,
              match_reason: "",
              technical_differences: "None",
              alternative_reason: "N/A"
            }
          ],
          gaps: []
        }
      ]
    };

    const escapeHtml = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");

    const asText = (value) => {
      if (value === null || value === undefined || value === "") return "N/A";
      if (typeof value === "object") return JSON.stringify(value, null, 2);
      return String(value);
    };

    const report = window.SUPPLIER_SEARCH_REPORT;
    const meta = document.getElementById("report-meta");
    meta.innerHTML = [
      ["Generated", report.generated_at || "N/A"],
      ["RFQ ID", report.rfq_id || "N/A"],
      ["Company", report.company_id || "N/A"],
      ["User", report.user_id || "N/A"],
      ["Persistence", `${report.persistence_table || "N/A"} - ${report.persistence_status || "N/A"}`]
    ].map(([label, value]) => `<span><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</span>`).join("");

    const itemsEl = document.getElementById("items");
    const items = Array.isArray(report.items) ? report.items : [];

    if (!items.length) {
      itemsEl.innerHTML = '<div class="item"><p class="empty">No supplier search items were provided.</p></div>';
    } else {
      itemsEl.innerHTML = items.map((item, index) => {
        const images = (Array.isArray(item.images) ? item.images : []).filter(img => img && img.url).slice(0, 3);
        const suppliers = Array.isArray(item.suppliers) ? item.suppliers : [];
        const imageHtml = images.length ? `
          <div class="images">
            ${images.map(img => `
              <figure>
                <img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.caption || item.company_description || "Product image")}" loading="lazy">
                <figcaption>${escapeHtml(img.caption || img.url)}</figcaption>
              </figure>
            `).join("")}
          </div>` : '<p class="empty">No verified product image available.</p>';

        const supplierHtml = suppliers.length ? suppliers.map(result => {
          const matchType = result.match_type === "alternative" ? "alternative" : "exact_match";
          return `
            <section class="supplier">
              <h3>${escapeHtml(result.supplier_name || "Unnamed supplier")}</h3>
              <p class="source"><strong>Source</strong><br><a href="${escapeHtml(result.source_url || "#")}" target="_blank" rel="noopener noreferrer">${escapeHtml(result.source_url || "No source URL")}</a></p>
              <div class="result-grid">
                <p class="span"><strong>Other information:</strong> ${escapeHtml(asText(result.other_information))}</p>
                <p><strong>Match type:</strong> <span class="badge ${matchType}">${escapeHtml(matchType)}</span></p>
                <p><strong>Match score:</strong> ${escapeHtml(asText(result.match_score))}</p>
                <p class="span"><strong>Match reason:</strong> ${escapeHtml(asText(result.match_reason))}</p>
                <p class="span"><strong>Technical differences:</strong> ${escapeHtml(asText(result.technical_differences || "None"))}</p>
                <p class="span"><strong>Alternative reason:</strong> ${escapeHtml(asText(result.alternative_reason || "N/A"))}</p>
              </div>
            </section>`;
        }).join("") : '<p class="empty">No verified supplier sources available.</p>';

        const gaps = Array.isArray(item.gaps) && item.gaps.length
          ? `<p class="empty"><strong>Gaps:</strong> ${escapeHtml(item.gaps.join("; "))}</p>`
          : "";

        return `
          <article class="item">
            <div class="item-head">
              <h2>ITEM ${escapeHtml(item.item_id || index + 1)}: ${escapeHtml(item.company_description || "No company description")}</h2>
              <div class="original-grid">
                <div class="field"><strong>item_id</strong>${escapeHtml(asText(item.item_id))}</div>
                <div class="field"><strong>qty</strong>${escapeHtml(asText(item.qty))}</div>
                <div class="field"><strong>uom</strong>${escapeHtml(asText(item.uom))}</div>
                <div class="field"><strong>company_description</strong>${escapeHtml(asText(item.company_description))}</div>
                <div class="field summary"><strong>agent_item_summary</strong>${escapeHtml(asText(item.agent_item_summary))}</div>
              </div>
            </div>
            ${imageHtml}
            <div class="supplier-list">${supplierHtml}</div>
            ${gaps}
          </article>`;
      }).join("");
    }
  </script>
</body>
</html>
